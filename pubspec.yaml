name: cineby_app
description: "Native Flutter wrapper for cineby.at with download manager and native video player."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # WebView — use flutter_inappwebview (NOT webview_flutter)
  # It supports JS injection, URL interception, custom headers,
  # and JavaScript channels natively — all required here.
  flutter_inappwebview: ^6.1.5

  # Native video player.
  # The spec's primary choice was better_player 0.0.84, but that package is
  # unmaintained and uses `hashValues`, which was removed from the Flutter
  # SDK in 3.7+. The spec's fallback is video_player + chewie, which is
  # what we use here.
  video_player: ^2.8.6
  chewie: ^1.7.4
  wakelock_plus: ^1.2.5

  # Download manager
  flutter_downloader: ^1.11.6
  path_provider: ^2.1.3
  permission_handler: ^11.3.1

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Local storage (download history, settings)
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/launcher_icon.png
