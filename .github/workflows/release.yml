name: Release

on:
  push:
    tags:
      - 'v*' # e.g. v0.1.0, v1.0.0
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

# A tag push triggers a release; in-flight runs of the same tag cancel each
# other out (so a re-tag after a fix doesn't pile up partial releases).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # needed for softprops/action-gh-release to upload assets

jobs:
  build:
    name: Build release APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history helps with changelog generation later

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.24.5'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_android proguard rule
        # See .github/workflows/build.yml for the full explanation.
        run: |
          GRADLE_FILE=$(find ~/.pub-cache -path '*flutter_inappwebview_android-*/android/build.gradle' 2>/dev/null | head -1)
          if [ -n "$GRADLE_FILE" ] && grep -q "proguard-android.txt" "$GRADLE_FILE"; then
            sed -i.bak "s|getDefaultProguardFile('proguard-android.txt')|'proguard-rules.pro'|g" "$GRADLE_FILE"
          fi

      - name: Resolve tag version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building release for ${VERSION}"

      - name: flutter build apk --release --split-per-abi
        # --split-per-abi produces three APKs (arm64-v8a, armeabi-v7a, x86_64),
        # each ~25 MB instead of one ~75 MB universal APK. Most users only need
        # one. If you'd rather have a single universal APK, drop the
        # --split-per-abi flag.
        run: flutter build apk --release --split-per-abi

      - name: List built APKs
        run: ls -la build/app/outputs/flutter-apk/

      - name: Upload APKs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cineby-${{ steps.version.outputs.version }}-apks
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release and attach APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
