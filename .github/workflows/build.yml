name: Build & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs of the same workflow on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: flutter analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.27.4' # pin to a known-good version; bump deliberately
          cache: true

      - name: Patch flutter_inappwebview_android proguard rule
        # flutter_inappwebview_android 1.1.3 references the deprecated
        # `proguard-android.txt` (which includes -dontoptimize). Modern AGP
        # rejects it. The package is unmaintained; this is the only viable
        # workaround until upstream fixes it. Tracked in README.md.
        run: |
          PUB_CACHE=$(flutter pub get --help 2>&1 | grep -oE 'Resolving dependencies in .*' | head -1 || true)
          GRADLE_FILE=$(find ~/.pub-cache -path '*flutter_inappwebview_android-*/android/build.gradle' 2>/dev/null | head -1)
          if [ -n "$GRADLE_FILE" ]; then
            echo "Patching $GRADLE_FILE"
            sed -i.bak "s|getDefaultProguardFile('proguard-android.txt')|'proguard-rules.pro'|g" "$GRADLE_FILE"
          else
            echo "flutter_inappwebview_android not found in pub-cache yet — will retry after pub get"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Re-apply patch if needed
        # The pub-cache directory may not exist before `flutter pub get`,
        # so the first patch is a no-op. Run it again now that deps are fetched.
        run: |
          GRADLE_FILE=$(find ~/.pub-cache -path '*flutter_inappwebview_android-*/android/build.gradle' 2>/dev/null | head -1)
          if [ -n "$GRADLE_FILE" ] && grep -q "proguard-android.txt" "$GRADLE_FILE"; then
            echo "Patching $GRADLE_FILE"
            sed -i.bak "s|getDefaultProguardFile('proguard-android.txt')|'proguard-rules.pro'|g" "$GRADLE_FILE"
          fi

      - name: flutter analyze
        run: flutter analyze --no-fatal-infos

  test:
    name: flutter test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.27.4'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: flutter test
        run: flutter test --reporter=expanded

  build-apk:
    name: build debug APK
    runs-on: ubuntu-latest
    needs: [analyze, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        # `subosito/flutter-action` does not install the Android SDK or accept
        # its licenses, so Android builds fail with a confusing AGP error.
        # We install cmdline-tools ourselves and use `sdkmanager` to fetch
        # the platform / build-tools we need. Pin everything for reproducible
        # builds.
        env:
          ANDROID_HOME: ${{ runner.temp }}/android-sdk
        run: |
          set -e
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd "$ANDROID_HOME/cmdline-tools"
          # 11076708 = commandlinetools-linux-11076708_latest.zip (2024 stable)
          curl -fsSL -o tools.zip \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q tools.zip
          mv cmdline-tools latest
          rm tools.zip
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          # Accept licenses
          yes | sdkmanager --licenses > /dev/null
          # Install required packages
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" > /dev/null
          # Persist for subsequent steps
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.27.4'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Patch flutter_inappwebview_android proguard rule
        run: |
          GRADLE_FILE=$(find ~/.pub-cache -path '*flutter_inappwebview_android-*/android/build.gradle' 2>/dev/null | head -1)
          if [ -n "$GRADLE_FILE" ] && grep -q "proguard-android.txt" "$GRADLE_FILE"; then
            sed -i.bak "s|getDefaultProguardFile('proguard-android.txt')|'proguard-rules.pro'|g" "$GRADLE_FILE"
          fi

      - name: Add groovy.xml.QName shim to Flutter's bundled :gradle subproject
        # `flutter_tools/gradle/flutter.groovy` imports `groovy.xml.QName`
        # at line 8 and uses it at line 557. Groovy 4.x (shipped with
        # Gradle 9.x) renamed this class to `groovy.namespace.QName`,
        # removing the legacy path entirely. The shim below re-exports
        # the class at the old path so the existing import keeps working
        # on both Groovy 3.x and 4.x. We add the file alongside
        # flutter.groovy in the same Groovy source set; Gradle picks it
        # up automatically. This patches the Flutter SDK in $FLUTTER_HOME
        # on the runner; it is not a project change.
        run: |
          echo "FLUTTER_HOME=$FLUTTER_HOME"
          echo "FLUTTER_GROOVY_DIR candidate 1: $FLUTTER_HOME/packages/flutter_tools/gradle/src/main/groovy"
          FLUTTER_GROOVY_DIR="$FLUTTER_HOME/packages/flutter_tools/gradle/src/main/groovy"
          if [ ! -d "$FLUTTER_GROOVY_DIR" ]; then
            # Some Flutter action versions install to a different path.
            echo "Not found. Searching for flutter_tools/gradle in common locations..."
            ls -la "$FLUTTER_HOME" 2>/dev/null || true
            for candidate in \
              "/opt/hostedtoolcache/flutter/stable-3.27.4-x64/flutter" \
              "/opt/hostedtoolcache/flutter/stable-x64/flutter" \
              "/usr/local/flutter" \
              "/opt/flutter"; do
              if [ -d "$candidate/packages/flutter_tools/gradle/src/main/groovy" ]; then
                FLUTTER_GROOVY_DIR="$candidate/packages/flutter_tools/gradle/src/main/groovy"
                echo "Found Flutter at: $candidate"
                break
              fi
            done
          fi
          if [ ! -d "$FLUTTER_GROOVY_DIR" ]; then
            echo "WARN: Flutter SDK location not found; cannot install shim"
            echo "Listing /opt/hostedtoolcache:"
            ls -la /opt/hostedtoolcache/ 2>/dev/null || true
            echo "Listing $FLUTTER_HOME/packages/flutter_tools/gradle/src/main/:"
            ls -la "$FLUTTER_HOME/packages/flutter_tools/gradle/src/main/" 2>/dev/null || true
            # Don't exit — let the build fail and we'll see the real error
            exit 0
          fi
          SHIM_FILE="$FLUTTER_GROOVY_DIR/groovy/xml/QName.groovy"
          echo "Will write shim to: $SHIM_FILE"
          mkdir -p "$FLUTTER_GROOVY_DIR/groovy/xml"
          if [ ! -f "$SHIM_FILE" ]; then
            printf '%s\n' \
              '// PATCH re-export QName at the legacy path (groovy.xml.QName) for Groovy 4.x' \
              'class QName extends groovy.namespace.QName {' \
              '    QName(String localPart) { super(localPart) }' \
              '    QName(String namespaceURI, String localPart) { super(namespaceURI, localPart) }' \
              '    QName(String namespaceURI, String localName, String prefix) {' \
              '        super(namespaceURI, localName, prefix)' \
              '    }' \
              '}' \
              > "$SHIM_FILE"
            echo "Wrote shim. Contents:"
            cat "$SHIM_FILE"
          else
            echo "Shim already present."
          fi

      - name: flutter build apk --debug
        run: flutter build apk --debug 2>&1 | tee /tmp/flutter-build.log; BUILD_EXIT=${PIPESTATUS[0]}; echo "build exit=$BUILD_EXIT"; exit $BUILD_EXIT

      - name: Upload build log (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-log
          path: /tmp/flutter-build.log
          if-no-files-found: warn
          retention-days: 3

      - name: Also dump shim + patch state
        if: always()
        run: |
          echo "=== shim search diagnostic ===" >> /tmp/flutter-build.log
          for candidate in \
            "$FLUTTER_HOME/packages/flutter_tools/gradle/src/main/groovy/groovy/xml/QName.groovy" \
            "/opt/hostedtoolcache/flutter/stable-3.27.4-x64/flutter/packages/flutter_tools/gradle/src/main/groovy/groovy/xml/QName.groovy" \
            "/opt/hostedtoolcache/flutter/stable-x64/flutter/packages/flutter_tools/gradle/src/main/groovy/groovy/xml/QName.groovy"; do
            echo "candidate: $candidate" >> /tmp/flutter-build.log
            if [ -f "$candidate" ]; then
              echo "  EXISTS. contents:" >> /tmp/flutter-build.log
              cat "$candidate" >> /tmp/flutter-build.log
            else
              echo "  not present" >> /tmp/flutter-build.log
            fi
          done
          # Re-upload
        env:
          GITHUB_STEP_SUMMARY: ''

      - name: Re-upload build log with shim diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-log-v2
          path: /tmp/flutter-build.log
          if-no-files-found: warn
          retention-days: 3

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7
